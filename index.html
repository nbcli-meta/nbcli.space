<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />

    <meta name="description" content="nbcli meta-instrument" />
    <meta name="author" content="magfoto" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: AvenirNext-Regular, 'Avenir Next', 'Avenir', 'Avenir Next LT Pro', 'Avenir LT Pro', 'Helvetica Neue', Helvetica, sans-serif;
        }

        .intro {
            position: absolute;
            top: -35px;
            left: 95px;
        }

        a {
            color: #777;
            text-decoration: none;
        }

        a:focus,
        a:hover {
            color: #ccc;
            text-decoration: none;
        }

        .typo img {
            position: absolute;
            left: -280px;
            top: 140px;
            max-width: 20%;
            filter: saturate(0%);
            filter: opacity(60%);
        }

        .modular img {
            position: absolute;
            max-width: 10%;
            bottom: 20px;
            right: -225px;
            filter: saturate(0%);
            filter: opacity(60%);
        }

        .container {
            position: relative;
            width: 800px;
            height: 800px;
        }

        @keyframes floatie {
            0% {}

            50% {
                top: 205px;
                left: 115px;
                border-color: #ddd;
                color: #ddd;
            }

            100% {}
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: transparent;
        }

        /* Outermost circle - territory */
        .circle-1 {
            width: 750px;
            height: 750px;
            top: 25px;
            left: 25px;
            border-color: #ccc;
        }

        /* Second layer - architecture */
        .circle-2 {
            width: 550px;
            height: 550px;
            top: 125px;
            left: 125px;
            border-color: #666;
        }

        /* Music circle */
        .circle-3 {
            width: 420px;
            height: 420px;
            top: 130px;
            left: 230px;
            border-color: #999;
            animation-name: floatie;
            animation-duration: 1.5s;
        }

        /* Archimusic circle */
        .circle-4 {
            width: 400px;
            height: 400px;
            top: 220px;
            left: 100px;
            border-color: #666;
            animation-name: floatie;
            animation-duration: 1.5s;
        }

        /* Live coding circle */
        .circle-5 {
            width: 300px;
            height: 300px;
            top: 380px;
            left: 300px;
            border-color: #ddd;
            animation-name: floatie;
            animation-duration: 1.5s;
        }

        /* Niche circle */
        .circle-6 {
            width: 200px;
            height: 200px;
            top: 180px;
            left: 520px;
            border-color: #777;
        }

        /* Center intersection - live coding architecture */
        .center-blob {
            position: absolute;
            width: 280px;
            height: 250px;
            top: 340px;
            left: 280px;
            background: #000;
            border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%;
            transform: rotate(-15deg);
        }

        /* Labels */
        .label {
            position: absolute;
            font-size: 18px;
            /* font-style: italic; */
            color: #333;
            /* pointer-events: none; */
        }

        .label-territory {
            bottom: -40px;
            left: 52%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 24px;
        }

        .label-architecture {
            bottom: 160px;
            left: 180px;
        }

        .label-music {
            top: 220px;
            right: 200px;
        }

        .label-archimusic {
            top: 310px;
            left: 300px;
        }

        .label-arch1 {
            top: 340px;
            left: 315px;
            font-size: 12px;
        }

        .label-live-coding {
            bottom: 150px;
            right: 175px;
        }

        .label-niche {
            top: 120px;
            right: 40px;
        }

        .label-center {
            top: 56%;
            left: 52%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            text-align: center;
            z-index: 10;
        }

        .ctr {
            top: 61%;
            left: 52%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }

        .markuplink {
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="intro">Official site of nbcli (Nothing but CLI), a meta-instrument and PhD research project. <a
                href="https://github.com/nbcli-meta/" target="_blank">[github]</a>
        </div>
        <div class="circle circle-1"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
        <div class="label label-architecture"><a href="research.html">research</a></div>
        <div class="label label-music"><a href="meta-notation.html" target="_blank">meta-notation</a></div>
        <div class="label label-archimusic"><a href="cmds.html" target="_blank">reference</a></div>
        <div class="label label-arch1">start here</div>
        <div class="label label-live-coding"><a
                href="https://youtube.com/playlist?list=PLBCmF6CXYUwYCK6adqH1kZFSL2HdPB3fW&si=sGFjM_iG5B0bfRnU">demos</a>
        </div>
        <div class="label label-niche"><a href="https://www.are.na/marcus-gordon/nbcli-gallery">gallery</a></div>
        <div class="label label-center"><a href="https://magfoto.any.org/kb">knowledge base</a></div>
        <div class="label ctr">ecosystem<br>commands<br>modules</div>
        <div class="label label-territory">nbcli<br>
            <div class="markuplink">
                <a href="https://nbcli.space" target="_blank">nbcli</a> is licensed under
                <a href="https://creativecommons.org/licenses/by-nc/4.0/?ref=chooser-v1" target="_blank">CC BY-NC
                    4.0</a>.
            </div>
        </div>
        <div class="typo">
            <img src="typo-ico.png" />
        </div>
        <div class="modular">
            <img src="subharmonicon.png" />
        </div>
    </div>

</body>

</html>
